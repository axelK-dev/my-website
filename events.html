<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Events | FictionTown Book Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/Favicon.svg">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body class="page-events">

    <header class="site-header">
        <!-- IDENTICAL HEADER -->
        <nav>
            <ul class="navbar">

                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="events.html">Events & Calendar</a></li>
                <li><a href="locations.html">Locations</a></li>
                <li><a href="about.html">About Us</a></li>

                <!-- THEMES DROPDOWN -->
                <li class="dropdown">
                    <span class="dropbtn">Themes</span>
                    <ul class="dropdown-content">
                        <li><button data-set-theme="light">Light</button></li>
                        <li><button data-set-theme="dark">Dark</button></li>
                        <li><button data-set-theme="neon">Neon</button></li>
                    </ul>
                </li>

            </ul>
        </nav>
    </header>

    <main class="site-main">


        <section class="events">
            <h2>Upcoming Events</h2>

            <div class="events-grid">

                <article class="event content-box">
                    <h3>Weekly Reading Night</h3>

                    <div class="image-frame">
                        <img src="images\pexels-rachel-claire-6761508.jpg" alt="Table set for Weekly Reading Night"
                            class="ken-burns-pic">
                    </div>

                    <p>Every Thursday at Oak Street Library.</p>
                </article>

                <article class="event content-box">
                    <h3>Discussion Dinner</h3>

                    <div class="image-frame">
                        <img src="images\pexels-taraschuiko-13694829.jpg" alt="Discussion Dinner at the local diner"
                            class="ken-burns-pic">
                    </div>

                    <p>Second Saturday of each month.</p>
                </article>

            </div>

        </section>

    </main>


    <footer class="site-footer">
        <p>© 2026 FictionTown Book Club</p>
    </footer>

    <script>
        // Apply theme from this session
        const sessionTheme = sessionStorage.getItem("theme");

        if (sessionTheme) {
            document.documentElement.setAttribute("data-theme", sessionTheme);
        }

        // Theme buttons
        const buttons = document.querySelectorAll('[data-set-theme]');

        buttons.forEach(button => {
            button.addEventListener('click', () => {

                const theme = button.dataset.setTheme;

                document.documentElement.setAttribute('data-theme', theme);

                sessionStorage.setItem("theme", theme);
            });
        });
    </script>
</body>

</html>
