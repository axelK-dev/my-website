<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Events | FictionTown Book Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="page-events">

    <header class="site-header">
        <!-- IDENTICAL HEADER -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events & Calendar</a></li>
                <li><a href="locations.html">Locations</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="site-main">

        <section class="events">
            <h2>Upcoming Events</h2>

            <article class="event content-box">
                <h3>Weekly Reading Night</h3>

                <div class="image-frame">
                    <img src="images\pexels-rachel-claire-6761508.jpg" alt="Table set forWeekly Reading Night"
                        class="ken-burns-pic">
                </div>

                <p>Every Thursday at Oak Street Library.</p>
            </article>

            <article class="event">
                <h3>Discussion Dinner</h3>

                <div class="image-frame">
                    <img src="images\pexels-taraschuiko-13694829.jpg" alt="Discussion Dinner at the local diner"
                        class="ken-burns-pic">
                </div>

                <p>Second Saturday of each month.</p>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <!-- IDENTICAL FOOTER -->
    </footer>
    <script>
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme) {
            document.documentElement.setAttribute("data-theme", savedTheme);
        }

        const buttons = document.querySelectorAll('[data-set-theme]');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const theme = button.dataset.setTheme;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem("theme", theme);
            });
        });
    </script>
</body>

</html>
